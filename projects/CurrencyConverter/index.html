<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>

  <!-- Bootstrap 5.3.6 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons 1.13.1 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- Cursive font to match your heading -->
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
    rel="stylesheet"
  />

  <style>
    h1 { font-family: 'Pacifico', ; }
  </style>
</head>

<body class="bg-white">
  <header class="bg-warning text-light p-3 text-center">
        <h1>Currency converter</h1>
    </header>
  <div class="container pt-5 fs-4" style="max-width:700px;">



    <!-- Main row: Amount | From | Swap | To -->
    <div class="row g-3 align-items-end mb-3">

      <!-- From -->
      <div class="col-12 col-sm-5 mx-2">
        <label for="country1" class="form-label fw-semibold text-dark-emphasis small">From</label>
        <div class="d-flex align-items-center gap-1">
          <img
            id="flag1"
            src=""
            alt=""
            class=""
            style="width:24px;height:18px;object-fit:cover;"
            onerror="this.src='https://placehold.co/24x18?text=?'"
          />
          <select id="country1" class="form-select form-select-sm border-success">
            <option value="">Select</option>
          </select>
        </div>
      </div>

      <!-- Swap button -->
      <div class="col-auto d-flex align-items-end pb-1">
        <button
          id="btnSwap"
          class="btn btn- btn-sm rounded-circle p-1 lh-1"
          title="Swap"
          style="width:32px;height:32px;"
        >
          <i class="bi bi-arrow-left-right small"></i>
        </button>
      </div>

      <!-- To -->
      <div class="col-12 col-sm-5 mx-3">
        <label for="country2" class="form-label fw-semibold text-dark-emphasis small">To</label>
        <div class="d-flex align-items-center gap-1">
          <img
            id="flag2"
            src=""
            alt=""
            class=""
            style="width:24px;height:18px;object-fit:cover;"
            onerror="this.src='https://placehold.co/24x18?text=?'"
          />
          <select id="country2" class="form-select form-select-sm border-success">
            <option value="">Select</option>
          </select>
        </div>
      </div>

            <!-- Amount -->
      <div class="col-12">
        <label for="orgAmount" class="form-label fw-semibold text-dark-emphasis small">Amount</label>
        <input
          type="number"
          id="orgAmount"
          class="form-control form-control-sm border-success"
          placeholder="1"
          min="0"
        />
      </div>

    </div><!-- /.row -->

    <!-- Validation errors -->
    <div id="errorSelect" class="text-danger small mb-1" style="min-height:18px;"></div>
    <div id="errorAmount" class="text-danger small mb-2" style="min-height:18px;"></div>

    <!-- Convert button -->
    <div class="mb-4 d-grid justify-content-center">
      <button id="btnConvert" class="btn btn-primary btn-sm px-5">
        <span id="btnText">Convert</span>
      </button>
    </div>

    <!-- RESULT -->
<div id="resultBox" class="d-grid justify-content-center">
  <p class="fw-bold text-dark mb-1">Converted Amount:</p>
  <p id="newAmount" class="text-success fs-4 fw-bold mb-0"></p>
  <p id="rateInfo" class="text-secondary small mt-1 mb-0"></p>
</div>

  </div><!-- /.container -->

  <script src="script.js"></script>
</body>
</html>

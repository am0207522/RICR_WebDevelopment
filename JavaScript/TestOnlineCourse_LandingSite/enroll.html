<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enroll – LearnSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
    <div class="container">
      <a class="navbar-brand brand-name" href="index.html">LearnSphere</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu2">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu2">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#courses">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ENROLL FORM -->
  <section class="py-section enroll-top">
    <div class="container">
      <div class="text-center mb-5">
        <span class="section-label">Registration</span>
        <h2 class="section-heading">Enroll in a Course</h2>
      </div>
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <form id="enrollForm" novalidate>

            <div class="row gy-3">
              <div class="col-md-6">
                <label class="form-label custom-label">Full Name</label>
                <input type="text" class="form-control custom-input" id="eName" placeholder="Aarav Sharma"/>
                <div class="error-msg" id="eErrName"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Phone Number</label>
                <input type="tel" class="form-control custom-input" id="ePhone" placeholder="10-digit mobile number"/>
                <div class="error-msg" id="eErrPhone"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Email</label>
                <input type="email" class="form-control custom-input" id="eEmail" placeholder="you@example.com"/>
                <div class="error-msg" id="eErrEmail"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Gender</label>
                <select class="form-select custom-input" id="eGender">
                  <option value="">Select gender</option>
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
                  <option>Prefer not to say</option>
                </select>
                <div class="error-msg" id="eErrGender"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">College</label>
                <input type="text" class="form-control custom-input" id="eCollege" placeholder="Your college name"/>
                <div class="error-msg" id="eErrCollege"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Branch</label>
                <input type="text" class="form-control custom-input" id="eBranch" placeholder="e.g. Computer Science"/>
                <div class="error-msg" id="eErrBranch"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Semester</label>
                <select class="form-select custom-input" id="eSemester">
                  <option value="">Select semester</option>
                  <option>1st</option><option>2nd</option><option>3rd</option>
                  <option>4th</option><option>5th</option><option>6th</option>
                  <option>7th</option><option>8th</option>
                </select>
                <div class="error-msg" id="eErrSemester"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label custom-label">Course Name</label>
                <input type="text" class="form-control custom-input" id="eCourseName" placeholder="e.g. Full-Stack Web Development"/>
                <div class="error-msg" id="eErrCourse"></div>
              </div>
              <div class="col-12 mt-2">
                <button type="submit" class="btn btn-primary custom-btn w-100">
                  Complete Enrollment <i class="bi bi-check-circle ms-1"></i>
                </button>
              </div>
            </div>

          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer text-center">
    <div class="container">
      <p class="mb-0">© 2025 LearnSphere. Made with ☕ and curiosity.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

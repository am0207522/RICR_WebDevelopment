<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i = 1;
        // condition i <= 5 hai so yha h i (1) se start hoga (5) tk jayga,
        // soo loop 5 baar chalega.
        while (i <= 5) {
            console.log(i);
            i++;
        }
        console.log("Loop run 5 times");
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Contact Form</title>

<style>

body{
    align-items: center;
    margin:0;
    font-family: Arial, sans-serif;
    background:#58a95a; /* */
}

/* INPUT form box design using css style */
.Form{
    width:340px;
    background:white;
    padding:25px;
    margin:120px auto;
    border-radius:22px;
    box-shadow:0px 0px 10px gray;
}

/* heading CONATCT US design using css style */
.Form h2{
    text-align:center;
    letter-spacing:2px;
    margin-bottom:20px;
}

/* form input fields design using css style*/
input, textarea{
    width:94%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

/* submit button design using css style */
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#4caf50;
    color:white;
    border:none;
    border-radius:20px;
    font-size:15px;
    cursor:pointer;     /* cursor pointer are used for mouse cursor hand icon*/
}

</style>
</head>

<body>

<div class="Form">

<h2>CONTACT US</h2>

<form>

<input type="text" placeholder="Name">

<input type="text" placeholder="Subject">

<input type="tel" maxlength="10" placeholder="Phone">

<input type="email" placeholder="Email">

<textarea rows="4" placeholder="Message"></textarea>

<button type="submit">S U B M I T</button>

</form>

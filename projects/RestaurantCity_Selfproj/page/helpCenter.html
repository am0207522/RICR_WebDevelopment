<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - Restaurant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Restaurant</a>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">

            <h1 class="text-center mb-5">Help Center</h1>

            <div class="accordion" id="helpAccordion">

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">
                            How can I make a reservation?
                        </button>
                    </h2>
                    <div id="q1" class="accordion-collapse collapse show">
                        <div class="accordion-body">
                            Go to the Reservation page, fill out the form, and submit your request.
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#q2">
                            What are your opening hours?
                        </button>
                    </h2>
                    <div id="q2" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            Monday to Sunday: 8:00 AM to 11:00 PM.
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#q3">
                            How can I contact support?
                        </button>
                    </h2>
                    <div id="q3" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            You can contact us through the Contact page or call us at +1 234 567 890.
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<!-- Tells the browser that this document is written in HTML5 -->

<html lang="en">
<!-- Root element of HTML page, lang="en" means English language -->

<head>
    <meta charset="UTF-8">
    <!-- Supports all characters (letters, symbols, etc.) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes page responsive for different screen sizes -->

    <title>Form task1</title>
    <!-- Title shown on browser tab -->
</head>

<body>
<!-- Main visible part of the webpage -->

    <form>
    <!-- Form tag is used to collect user input -->

        <fieldset style="width:450px;">
        <!-- Fieldset creates a box around the form
             width is set to match the given image -->

        <h2>Admin Login Page</h2>
        <!-- Heading of the form -->

        <table cellpadding="10">
        <!-- Table is used for proper alignment
                 cellpadding adds space inside table cells -->

                <tr>
                 <!-- Table row -->
                <td>Username:</td>
                <!-- Label text -->

                    <td>
                    <input type="text" name="username">
                    <!-- Textbox to enter username -->
                    </td>
                </tr>

                <tr>
                    <td>Password:</td>

                    <td>
                    <input type="password" name="password">
                        <!-- Password field hides typed characters -->
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <!-- Empty cell for alignment -->

                    <td>
                    <input type="submit" value="Submit">
                    <!-- Submit button sends form data -->

                    <input type="reset" value="Reset">
                    <!-- Reset button clears all inputs -->
                    </td>
                </tr>

            </table>
            <!-- End of table -->

        </fieldset>
        <!-- End of fieldset -->

    </form>
    <!-- End of form -->

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // increment - 1 se 5 tak
        let i = 1;
        while (i <= 5) {
            console.log(i);
            i++;
        }

        // decrement - 5 se 1 tak
        let j = 5;
        while (j >= 1) {
            console.log(j);
            j--;
        }
    </script>
</body>
</html>

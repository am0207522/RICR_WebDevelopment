<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Registration</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #2b2bd9, #3a2fd6);
      height: 100vh;
    }
    .card {
      border-radius: 10px;
    }
    .form-control {
      border: none;
      border-bottom: 1px solid #ccc;
      border-radius: 0;
    }
    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
  <div class="row justify-content-center gap-4">

    <!-- LOGIN -->
    <div class="col-md-4">
      <div class="card p-4">
        <h2><u>Lo</u>gin</h2>

        <div class="mb-4 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" class="form-control" placeholder="Enter your Email">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" class="form-control" placeholder="Create a Password">
        </div>

        <div class="d-flex justify-content-between mb-3">
          <div>
            <input type="checkbox"> Remember Me
          </div>
          <a href="#" class="text-primary">Forgot Password?</a>
        </div>

        <button class="btn btn-primary w-100 text-white">Login</button>

        <p class="text-center mt-3">
          Don't have an account?
          <a href="#" class="text text-decoration-none">Signup Now</a>
        </p>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="col-md-4">
      <div class="card p-4">
        <h2><u>Re</u>gistration</h2>

        <div class="mb-3 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" class="form-control" placeholder="Enter your Name">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" class="form-control" placeholder="Enter your Email">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" class="form-control" placeholder="Create a Password">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text bg-white border-0">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" class="form-control" placeholder="Confirm Password">
        </div>

        <div class="mb-3">
          <input type="checkbox"> I accept all terms & conditions
        </div>

        <button class="btn btn-primary w-100 text-white">Register</button>

        <p class="text-center mt-3">
          Already have an account?
          <a href="#" class="text-primary text text-decoration-none">Login Now</a>
        </p>
      </div>
    </div>

  </div>
</div>

</body>
</html>

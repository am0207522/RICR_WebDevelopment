<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RICR Enquiry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-box">
  <div class="form-box">

    <h2>Enquiry Form</h2>
    <p>Have questions or need assistance? Fill out the form below.</p>

    <form>

      <div class="row">
        <input type="text" placeholder="Person Name">
        <input type="text" placeholder="Contact Number">
      </div>

      <div class="row">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Qualification">
      </div>

      <input type="text" placeholder="College/School Name">

      <div class="row">
        <select>
          <option>Year</option>
        </select>

        <input type="text" placeholder="Branch">
      </div>

      <div class="row">
        <div class="left">
          <p>Interested in Which Course:</p>
          <label><input type="checkbox"> Full Stack Web Development</label>
          <label><input type="checkbox"> Data Science</label>
          <label><input type="checkbox"> Python Programming</label>
          <label><input type="checkbox"> Java Programming</label>
        </div>

        <div class="right">
          <p>Source of Information</p>
          <select>
            <option>Select</option>
          </select>

          <p>Name of Executive</p>
          <select>
            <option>Select</option>
          </select>
        </div>
      </div>

      <button type="submit">Submit</button>

    </form>

  </div>
</div>

</body>
</html>

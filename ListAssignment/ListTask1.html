

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Task1</title>

</head>
<body>
    <style>
        ul {
            list-style-position: inside;
            padding-left: 0;
            text-align: center;
        }
    </style>
    <Center>

    <h3>Disc bullets list:</h3>
    <ul type="Disc">
        <li>Apples</li>
        <li>Bananas</li>
        <li>Lemons</li>
        <li>Oranges</li>
    </ul>

    <h3>Circle bullets list:</h3>
    <ul type="Circle">
        <li>Apples</li>
        <li>Bananas</li>
        <li>Lemons</li>
        <li>Oranges</li>
    </ul>

    <h3>Square bullets list:</h3>
    <ul type="Square">
        <li>Apples</li>
        <li>Bananas</li>
        <li>Lemons</li>
        <li>Oranges</li>
    </ul>
  </Center>

</body>

</html>

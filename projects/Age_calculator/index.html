<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRil4kxILfVy47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YByjZqJLE"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
   <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
     <h1 class="text-center mb-3">Age Calculator</h1>

      <form class="d-flex flex-column gap-3 align-items-center w-100 p-3">
        <label for="DOB">Enter your Date of Birth</label>
        <input type="date" name="DOB" id="DOB" class="form-control" />
        <label for="CurrentDate">Choose Current Date</label>
        <input 
        type="date" 
        name="CurrentDate" 
        id="CurrentDate" />
        <button type="submit" class="btn btn-primary">Calulate Age</button>
      </form>
   </div>

   <div class="fw-bold text-center">
     Your age is : <span id="MY Age">XX</span>
   </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITXJ"
      crossorigin="anonymous"
    ></script>
    <script src="script.jss"></script>
</body>
</html>

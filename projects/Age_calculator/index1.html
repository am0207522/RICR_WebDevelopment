<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
</head>
<body>

  <div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow p-4 text-center" id="calcCard">

      <h2 class="fw-bold mb-4 mt-3">AGE CALCULATOR</h2>

      <form id="ageForm">

        <p class="fw-semibold mb-4">Enter your Date of Birth</p>
        <input type="date" id="DOB" name="DOB" class="form-control mb-4" />

        <p class="fw-semibold mb-4">Current Date</p>
        <input type="date" id="CurrentDate" name="CurrentDate" class="form-control mb-4" />

        <button type="submit" class="btn btn-primary px-3 mb-0 mt-2">Calculate</button>

      </form>

      <p class="text-danger mt-3 mb-0 d-none" id="errorMsg"></p>

      <div class="mt-4 d-none" id="resultBox">
        <hr />
        <p class="fs-5 fw-bold mb-0">Your age is :
          <span id="myAge" class="text-warning></span>
        </p>
      </div>

    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDXMvvZP7q+TnKZSmEFJ5u6LxbH"
    crossorigin="anonymous"
  ></script>
  <script src="Script1.js"></script>
</body>
</html>

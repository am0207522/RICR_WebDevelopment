  <link rel="stylesheet" href="../style.css" />
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Restaurant</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">
      <ul class="navbar-nav gap-2">
        <li class="nav-item"><a class="nav-link" href="../index.html">HOME</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">ABOUT</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">MENU</a></li>

    </div>
  </div>
</nav>

<!-- contact section -->
 <section class="bg-white page-top pb-5 flex-grow-1" id="contact">
  <div class="container py-5">
    <div class="row g-4">

      <!-- Left side -->
      <div class="col-lg-6">
        <div class="mb-3">
          <input type="text" class="form-control rounded-0" placeholder="Name" />
        </div>
        <div class="mb-3">
          <input type="email" class="form-control rounded-0" placeholder="Email" />
        </div>
        <div class="mb-3">
          <input type="text" class="form-control rounded-0" placeholder="Subject" />
        </div>
        <button type="submit" class="btn btn-success rounded-0 px-4 py-2">Send Message</button>
      </div>

      <!-- Right side -->
      <div class="col-lg-6">
        <textarea class="form-control rounded-0 h-100" placeholder="Message" rows="8"></textarea>
      </div>

    </div>
  </div>
</section>

<!-- footer section -->
<footer class="bg-dark py-4 mb">
  <div class="container">
    <div class="row text-center">
      <div class="col-md-4">
        <p class="text-white-50 mb-0">&copy; Restaurant 2026, Theme by <a href="https://themewagon.com/" class="text-white-50">ThemeWagon</a></p>
      </div>

    </div>
  </div>
</footer>

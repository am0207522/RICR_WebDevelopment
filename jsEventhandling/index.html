<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Customizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="layout">
    <div>
      <div class="para-area" id="para-box">
        <p class="para-heading" id="para-heading">This is a heading</p>
        <p class="para-para" id="para-para">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit.<br>
          Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.<br>
          Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris <br>
          nisi ut aliquip ex ea commodo consequat.
        </p>
      </div>
    </div>

    <div>
      <div class="colorbttn">
        <div class="bttnrow">
          <span class="bttn-label">Background color</span>
          <input type="color" id="bg-color" value="#ffffff" />
        </div>
        <div class="bttnrow">
          <span class="bttn-label">Heading color</span>
          <input type="color" id="heading-color" value="#111111" />
        </div>
        <div class="bttnrow">
          <span class="bttn-label">Paragraph color</span>
          <input type="color" id="para-color" value="#444444" />
        </div>
      </div>
      <br><button class="reset-btn" id="reset-btn">Reset all</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

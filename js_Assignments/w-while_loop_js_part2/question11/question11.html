<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // increment- 1 se 5 tak
        let a = 1;
        while (a <= 5) {
            console.log(a);
            a++;
        }
        // decrement- 5 se 1 tak
        let b = 5;
        while (b >= 1) {
            console.log(b);
            b--;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Table with Lists</title>

    <!-- Here i add website name getbootstrap.com__ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Table with 5 Rows and 2 Different Lists</h2>

    <table class="table table-striped">
        <thead class="table-info">
            <tr>
                <th>Row No.</th>
                <th>Ordered List</th>
                <th>Unordered List</th>
            </tr>
        </thead>

        <tbody>
            <tr class="table-light">
                <td>1</td>
                <td>
                    <ol>
                        <li>HTML</li>
                        <li>CSS</li>
                        <li>JavaScript</li>
                    </ol>
                </td>
                <td>---</td>
            </tr>

            <tr class="table-warning">
                <td>2</td>
                <td>---</td>
                <td>
                    <ul>
                        <li>ADITYA</li>
                        <li>MISHRA</li>
                        <li>ADITYA</li>
                    </ul>
                </td>
            </tr>

            <tr class="table-light">
                <td>3</td>
                <td>LPU 1</td>
                <td>LPU 2</td>
            </tr>

            <tr class="table-warning">
                <td>4</td>
                <td>LPU 3</td>
                <td>LPU 4</td>
            </tr>

            <tr>
                <td>5</td>
                <td>LPU 5</td>
                <td>LPU 6</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>

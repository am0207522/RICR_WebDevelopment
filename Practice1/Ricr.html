<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

     <!-- <style>
        fieldset {
            width: fit-content;
        }
    </style> -->

</head>
<body>

<h2 align="left">Registration Form</h2>


<fieldset >
<legend><b>Student Registration</b></legend>

<table border="0" align="left">

    <tr>
        <td><label for="name">Full Name :</label></td>
        <td><input type="text" name="myname" id="name"></td>
    </tr>

    <tr>

    </tr>

    <tr>
        <td><label for="email">Email :</label></td>
        <td><input type="email" name="myemail" id="email"></td>
    </tr>

    <tr>
        <td><label for="password">Password :</label></td>
        <td><input type="password" name="mypass" id="password"></td>
    </tr>

    <tr>
        <td><label for="branch">Branch :</label></td>
        <td><input type="text" name="branch" id="branch"></td>
    </tr>

    <tr>
        <td><label for="contact">Contact No :</label></td>
        <td>91+ <input type="text" name="contact" id="contact" maxlength="10"></td>
    </tr>

    <tr>
        <td><label for="college">College Name :</label></td>
        <td><input type="text" name="collegename" id="college"></td>
    </tr>

    <tr>
        <td>State :</td>
        <td>
            <select name="state">
                <option>Select</option>
                <option>Uttar Pradesh</option>
                <option>Delhi</option>
                <option>Bihar</option>
            </select>
        </td>
    </tr>

    <tr>
        <td><label for="city">City :</label></td>
        <td><input type="text" name="city" id="city"></td>
    </tr>

    <tr>
        <td colspan="2" align="right"><br>
            <input type="submit" value="Submit">
        </td>
    </tr>


      <!--FOR COURSE SELECT -->

    <tr>
           <td>Course :</td>
        <td>
           <select name="course"</select>
           <option>select</option>
        </td>
    </tr>

          <!--FOR Radio click option SELECT -->

    <tr>
        <td>
           <span>Gender</span>
           <input type="radio" name="gender" value="female"><br>
        </td>
    </tr>

</fieldset>
</table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // initialization
        let i = 1;

        while (i <= 3) {
        //    condition check
        //     work 
            console.log(i);
        //    update
            i++;
            // repeat
        }
        // i=1 condition true  → print 1 → i=2
        // i=2 condition true  → print 2 → i=3
        // i=3 condition true  → print 3 → i=4
        // i=4 condition false → loop stop
    </script>
</body>
</html>

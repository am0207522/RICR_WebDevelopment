<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a href="../index.html" class="navbar-brand fw-bold">Restaurant</a>
    </div>
</nav>

<section class="container py-5">
    <h1 class="text-center mb-5">Order Food Online</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <img src="https://themewagon.github.io/restaurant-2/images/food_icon01.jpg" class="card-img-top" alt="Burger">
                <div class="card-body text-center">
                    <h5 class="card-title">Chicken Burger</h5>
                    <p class="text-success fw-bold">$20</p>
                    <button class="btn btn-success">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <img src="https://themewagon.github.io/restaurant-2/images/food_icon02.jpg" class="card-img-top" alt="Pizza">
                <div class="card-body text-center">
                    <h5 class="card-title">Pizza</h5>
                    <p class="text-success fw-bold">$25</p>
                    <button class="btn btn-success">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <img src="https://themewagon.github.io/restaurant-2/images/food_icon03.jpg" class="card-img-top" alt="Pasta">
                <div class="card-body text-center">
                    <h5 class="card-title">Pasta</h5>
                    <p class="text-success fw-bold">$18</p>
                    <button class="btn btn-success">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>

    <div class="row justify-content-center mt-5">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="mb-4">Place Your Order</h3>

                    <form>
                        <input type="text" class="form-control mb-3" placeholder="Full Name">

                        <input type="email" class="form-control mb-3" placeholder="Email">

                        <input type="tel" class="form-control mb-3" placeholder="Phone Number">

                        <textarea class="form-control mb-3" rows="4" placeholder="Delivery Address"></textarea>

                        <button type="submit" class="btn btn-success w-100">
                            Place Order
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script type="text/javascript" src="app.js"></script>
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color:#001f4f; font-family:'Raleway',sans-serif;">

    <div class="container bg-white position-relative" style="width:350px; border-radius:20px; padding:0;">

        <h1 class="text-white text-center m-0" style="background-color:#ff851b; font-weight:100; border-top-left-radius:20px; border-top-right-radius:20px; font-size:18px; padding:10px;">
            TIP CALCULATOR
        </h1>

        <div class="wrapper" style="padding:20px;">

            <p>Bill Amount</p>
            <input type="text" id="amount" placeholder="Amount to be paid"
                style="width:80%; border:none; border-bottom:1px solid #0074d9; padding:10px;"
                onfocus="this.style.border='1px solid #0074d9';this.style.outline='none';"
                onblur="this.style.border='none';this.style.borderBottom='1px solid #0074d9';"/> ₹

            <p>How was the service ?</p>
            <select id="services"
                style="width:88%; border:none; border-bottom:1px solid #0074d9; padding:10px;"
                onfocus="this.style.border='1px solid #0074d9';this.style.outline='none';"
                onblur="this.style.border='none';this.style.borderBottom='1px solid #0074d9';">
                <option selected disabled hidden>Select</option>
                <option value="0.25">25% - Top Notch</option>
                <option value="0.20">20% - Excellent</option>
                <option value="0.15">15% - Good</option>
                <option value="0.10">10% - Bad</option>
                <option value="0.05">5% - Worst</option>
            </select>

            <p>Total number of persons</p>
            <input type="text" id="persons" placeholder="Number of people sharing the bill"
                style="width:80%; border:none; border-bottom:1px solid #0074d9; padding:10px;"
                onfocus="this.style.border='1px solid #0074d9';this.style.outline='none';"
                onblur="this.style.border='none';this.style.borderBottom='1px solid #0074d9';"/>

            <button id="calculate" class="d-block mx-auto"
                style="margin:20px auto; width:150px; height:50px; background-color:#39cccc; color:#fff; font-size:16px; border:none; border-radius:5px;">
                Calculate
            </button>
        </div>

        <div class="tip text-center" style="font-size:18px; display:none; padding-bottom:15px;">
            <p>Tip Amount</p>
            <span id="total">0</span>₹
            <span id="each">each</span>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
